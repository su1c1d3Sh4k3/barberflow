<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary-fixed-variant": "#574425",
                    "primary-fixed-dim": "#bec6e0",
                    "on-error-container": "#93000a",
                    "surface-variant": "#e2e2e2",
                    "on-secondary-fixed": "#2a1700",
                    "surface-container-highest": "#e2e2e2",
                    "primary-container": "#131b2e",
                    "on-tertiary-fixed": "#271901",
                    "on-tertiary-container": "#98805d",
                    "on-primary-container": "#7c839b",
                    "on-surface-variant": "#45464d",
                    "inverse-surface": "#2f3130",
                    "surface": "#f9f9f8",
                    "on-secondary": "#ffffff",
                    "primary-fixed": "#dae2fd",
                    "secondary-container": "#fea619",
                    "on-secondary-container": "#684000",
                    "error-container": "#ffdad6",
                    "on-surface": "#1a1c1c",
                    "on-primary": "#ffffff",
                    "secondary": "#855300",
                    "outline": "#76777d",
                    "on-secondary-fixed-variant": "#653e00",
                    "background": "#f9f9f8",
                    "surface-container-low": "#f3f4f3",
                    "error": "#ba1a1a",
                    "inverse-on-surface": "#f1f1f0",
                    "surface-container-lowest": "#ffffff",
                    "tertiary": "#000000",
                    "secondary-fixed": "#ffddb8",
                    "inverse-primary": "#bec6e0",
                    "on-primary-fixed-variant": "#3f465c",
                    "on-error": "#ffffff",
                    "on-background": "#1a1c1c",
                    "outline-variant": "#c6c6cd",
                    "secondary-fixed-dim": "#ffb95f",
                    "primary": "#000000",
                    "tertiary-fixed": "#fcdeb5",
                    "surface-tint": "#565e74",
                    "on-primary-fixed": "#131b2e",
                    "tertiary-fixed-dim": "#dec29a",
                    "tertiary-container": "#271901",
                    "surface-bright": "#f9f9f8",
                    "on-tertiary": "#ffffff",
                    "surface-container": "#eeeeed",
                    "surface-dim": "#dadad9",
                    "surface-container-high": "#e8e8e7"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Inter"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen max-w-[390px] mx-auto overflow-x-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-6 py-4 max-w-[390px] mx-auto bg-[#FAFAF9] dark:bg-[#0F172A] transition-colors">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#0F172A] dark:text-[#FAFAF9]">arrow_back</span>
<span class="font-['Inter'] font-semibold tracking-tight text-lg text-[#0F172A] dark:text-[#FAFAF9]">BarberFlow</span>
</div>
<div class="w-8 h-8 rounded-full overflow-hidden bg-surface-container-high">
<img alt="Avatar" data-alt="professional modern minimalist avatar of a barber wearing a stylish black apron in a high-end salon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBlD2lh7Vss1Tm0pc6rzUV319TsPAOdy_CBVSu-7_apFOzWUGxV79BS3plJs1LaNB-7iD0fxwVhTbpUjlF5WJjzvbYO6ip3A27mMruPamVjnKyiIBpDw4bsb0LyD0apjHIqUtDxPgXmNSeUzi88OTKXvf4ExiHoztzEk5TRp2aUp6R88BxUc_-MuPpohz8j8jgqf4L_qGIPg_WzSUPK1M2wl9G32Y4wo1FJcE9kEO5eY2Du9-2RjtlqYt_TQIUCoumuEuz3fShHMZo"/>
</div>
</header>
<main class="pt-24 pb-32 px-6">
<!-- Search Section -->
<section class="mb-10">
<h1 class="text-[2.5rem] font-bold leading-tight tracking-tight mb-4 text-primary">Minha Agenda</h1>
<p class="text-on-surface-variant mb-8 text-sm">Insira seu telefone para localizar seus agendamentos ativos.</p>
<div class="bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant/10 p-1 flex items-center gap-2 group transition-all focus-within:ring-2 focus-within:ring-secondary-container/30">
<div class="pl-4 text-on-surface-variant flex items-center">
<span class="material-symbols-outlined text-lg">phone</span>
</div>
<input class="w-full py-4 bg-transparent border-none focus:ring-0 text-on-surface font-medium placeholder:text-outline-variant" placeholder="(11) 99999-9999" type="text"/>
<button class="bg-primary text-on-primary px-6 py-3 rounded-lg font-semibold mr-1 hover:opacity-90 transition-opacity">
                    Buscar
                </button>
</div>
</section>
<!-- Active Appointment Card (The "Appointment Grain") -->
<section class="space-y-6">
<div class="flex items-center justify-between">
<span class="text-[0.75rem] font-bold uppercase tracking-widest text-secondary">Próximo Horário</span>
<span class="bg-secondary-container/20 text-on-secondary-container px-3 py-1 rounded-full text-[0.7rem] font-bold">CONFIRMADO</span>
</div>
<div class="bg-surface-container-lowest rounded-lg p-8 relative overflow-hidden group border border-outline-variant/10">
<div class="absolute top-0 right-0 w-32 h-32 bg-secondary/5 rounded-full -mr-16 -mt-16 transition-transform group-hover:scale-110"></div>
<div class="flex flex-col gap-6 relative z-10">
<div class="flex justify-between items-start">
<div>
<h2 class="text-2xl font-bold text-primary mb-1">Corte &amp; Barba Premium</h2>
<p class="text-on-surface-variant text-sm flex items-center gap-2">
<span class="material-symbols-outlined text-sm">person</span>
                                Barber: Marco Aurélio
                            </p>
</div>
<div class="bg-surface-container-low p-3 rounded-lg text-center min-w-[70px]">
<span class="block text-xs font-bold uppercase text-on-surface-variant">Dez</span>
<span class="block text-2xl font-extrabold text-primary">14</span>
</div>
</div>
<div class="flex gap-8 border-t border-surface-container-high pt-6">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-surface-container-low flex items-center justify-center">
<span class="material-symbols-outlined text-secondary">schedule</span>
</div>
<div>
<span class="block text-[0.7rem] text-outline uppercase font-bold tracking-tighter">Horário</span>
<span class="block font-bold text-on-surface">14:30</span>
</div>
</div>
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-surface-container-low flex items-center justify-center">
<span class="material-symbols-outlined text-secondary">payments</span>
</div>
<div>
<span class="block text-[0.7rem] text-outline uppercase font-bold tracking-tighter">Valor</span>
<span class="block font-bold text-on-surface">R$ 120,00</span>
</div>
</div>
</div>
</div>
</div>
</section>
<!-- Actions Section -->
<section class="mt-12 flex flex-col gap-4">
<button class="w-full bg-primary text-on-primary py-5 rounded-lg font-bold flex items-center justify-center gap-2 shadow-xl shadow-primary/10 hover:scale-[0.98] transition-transform">
<span class="material-symbols-outlined">event_repeat</span>
                Reagendar
            </button>
<button class="w-full bg-surface-container-low text-error py-5 rounded-lg font-bold flex items-center justify-center gap-2 hover:bg-error-container/20 transition-colors">
<span class="material-symbols-outlined">cancel</span>
                Cancelar agendamento
            </button>
<button class="w-full bg-transparent text-on-surface-variant py-4 rounded-lg font-medium flex items-center justify-center gap-2 hover:text-primary transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
                Voltar ao menu
            </button>
</section>
</main>
<!-- Footer -->
<footer class="w-full px-8 py-12 flex flex-col gap-6 bg-[#F3F4F3] dark:bg-[#131B2E] rounded-t-lg">
<div class="flex flex-col gap-4">
<span class="font-bold text-[#0F172A] dark:text-[#F59E0B]">BarberFlow</span>
<div class="flex flex-wrap gap-x-6 gap-y-2">
<a class="font-['Inter'] text-sm leading-relaxed text-slate-500 hover:text-[#F59E0B] transition-colors" href="#">Address</a>
<a class="font-['Inter'] text-sm leading-relaxed text-slate-500 hover:text-[#F59E0B] transition-colors" href="#">Phone</a>
<a class="font-['Inter'] text-sm leading-relaxed text-slate-500 hover:text-[#F59E0B] transition-colors" href="#">Hours</a>
</div>
</div>
<div class="pt-6 border-t border-outline-variant/10">
<p class="font-['Inter'] text-sm leading-relaxed text-slate-500">Powered by BarberFlow</p>
</div>
</footer>
</body></html>
